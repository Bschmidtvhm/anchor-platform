<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ANCHOR — Platform UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:       '#1A2332',
            teal:       '#14907F',
            'teal-dk':  '#0D7A6A',
            'teal-lt':  '#D4EDE9',
            'teal-mid': '#1D7A5F',
            'teal-pale':'#E8F5F1',
            bg:         '#F7F9FB',
            muted:      '#8A9BB0',
            body:       '#4A5568',
            inactive:   '#AABCCC',
            border:     '#E2E8EF',
            'hdr-bg':   '#F0F2F5',
            'red-dk':   '#C0392B',
            'red-lt':   '#FDECEA',
            amber:      '#F5A623',
            'amber-dk': '#B45309',
            'amber-lt': '#FEF3DC',
            'blue-dk':  '#1D4ED8',
            'blue-lt':  '#DBEAFE',
            'purple-dk':'#6D28D9',
            'purple-lt':'#EDE9FE',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #F7F9FB; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #F0F2F5; }
    ::-webkit-scrollbar-thumb { background: #AABCCC; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const STATUS_STYLES = {
  'Action Needed':    { bg:'#FEF3DC', dot:'#F5A623', text:'#B45309' },
  'In Progress':      { bg:'#EDE9FE', dot:'#6D28D9', text:'#6D28D9' },
  'Fulfilled':        { bg:'#D4EDE9', dot:'#14907F', text:'#0D7A6A' },
  'Pending Auth':     { bg:'#DBEAFE', dot:'#1D4ED8', text:'#1D4ED8' },
  'Ready to Fulfill': { bg:'#E8F5F1', dot:'#1D7A5F', text:'#1D7A5F' },
  'Initiated':        { bg:'#F0F2F5', dot:'#8A9BB0', text:'#4A5568' },
  'Complete':         { bg:'#D4EDE9', dot:'#14907F', text:'#0D7A6A' },
  'On Track':         { bg:'#E8F5F1', dot:'#1D7A5F', text:'#1D7A5F' },
  'Attention':        { bg:'#FEF3DC', dot:'#F5A623', text:'#B45309' },
};

const TRIGGER_STYLES = {
  'Post-Discharge':   { bg:'#FDECEA', text:'#C0392B', icon:'🏥' },
  'ED Frequent':      { bg:'#FEF3DC', text:'#B45309', icon:'⚠️' },
  'CM Interaction':   { bg:'#DBEAFE', text:'#1D4ED8', icon:'📋' },
  'Annual Wellness':  { bg:'#EDE9FE', text:'#6D28D9', icon:'🩺' },
  'HRA Flag':         { bg:'#D4EDE9', text:'#0D7A6A', icon:'📊' },
};

function StatusBadge({ status }) {
  const s = STATUS_STYLES[status] || { bg:'#F0F2F5', dot:'#8A9BB0', text:'#4A5568' };
  return (
    <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded text-xs font-bold"
      style={{ background: s.bg, color: s.text }}>
      <span className="w-1.5 h-1.5 rounded-full inline-block flex-shrink-0" style={{ background: s.dot }} />
      {status}
    </span>
  );
}

function TriggerBadge({ trigger }) {
  const t = TRIGGER_STYLES[trigger] || { bg:'#F0F2F5', text:'#4A5568', icon:'•' };
  return (
    <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold"
      style={{ background: t.bg, color: t.text }}>
      <span>{t.icon}</span>{trigger}
    </span>
  );
}

function Avatar({ initials, size = 'sm' }) {
  const sz = size === 'lg' ? 'w-14 h-14 text-lg' : 'w-7 h-7 text-xs';
  return (
    <div className={`${sz} rounded-full flex items-center justify-center font-bold flex-shrink-0`}
      style={{ background:'#D4EDE9', color:'#0D7A6A' }}>{initials}</div>
  );
}

function StatCard({ label, value, sub, valueColor = '#14907F' }) {
  return (
    <div className="bg-white rounded p-4 flex flex-col gap-1 shadow-sm">
      <div className="text-xs font-bold" style={{ color:'#8A9BB0' }}>{label}</div>
      <div className="text-3xl font-bold leading-none" style={{ color: valueColor }}>{value}</div>
      <div className="text-xs" style={{ color:'#8A9BB0' }}>{sub}</div>
    </div>
  );
}

const TABS = ['CM Worklist','Member Detail','Needs Assessment','Benefit Sequencing','Coverage Stack','ILOS / Cap Tracker','Plan Dashboard'];

function NavBar({ active, onNav }) {
  return (
    <nav className="flex items-center h-11 px-4 gap-0 flex-shrink-0 overflow-x-auto" style={{ background:'#1A2332' }}>
      <div className="flex items-center gap-1.5 mr-4 flex-shrink-0">
        <span className="text-white font-bold text-sm">ANCHOR</span>
        <span className="w-2 h-2 rounded-full" style={{ background:'#14907F' }} />
      </div>
      {TABS.map(tab => (
        <button key={tab} onClick={() => onNav(tab)}
          className="relative px-3 h-11 text-xs font-bold transition-colors flex-shrink-0"
          style={{ color: active === tab ? '#FFFFFF' : '#AABCCC', background:'transparent', border:'none', cursor:'pointer' }}>
          {tab}
          {active === tab && (
            <span className="absolute bottom-0 left-3 right-3 h-1 rounded-t" style={{ background:'#14907F' }} />
          )}
        </button>
      ))}
      <div className="ml-auto w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0"
        style={{ background:'#14907F' }}>SC</div>
    </nav>
  );
}

/* ── SCREEN 0: CM WORKLIST (new — health plan care manager view) ── */
const cmMembers = [
  { initials:'MC', name:'Margaret Chen',   age:78, plan:'D-SNP', id:'D-4821', trigger:'Post-Discharge', triggerDetail:'DC from St. Joseph\'s — Mar 8', needs:'Fall risk · Home safety · Medication mgmt', status:'Action Needed', cm:'S. Chen',    riskTier:'HIGH', isNew:false },
  { initials:'RW', name:'Robert Williams', age:82, plan:'D-SNP', id:'D-3312', trigger:'ED Frequent',    triggerDetail:'3rd ED visit in 60 days',        needs:'Transportation · Caregiver strain · SDOH', status:'Action Needed', cm:'M. Park',    riskTier:'HIGH', isNew:false },
  { initials:'HP', name:'Harold Patel',    age:80, plan:'D-SNP', id:'D-7734', trigger:'ED Frequent',    triggerDetail:'2nd ED visit in 30 days',        needs:'Food insecurity · Social isolation',        status:'Action Needed', cm:'Unassigned', riskTier:'HIGH', isNew:true  },
  { initials:'DJ', name:'Dorothy Jackson', age:71, plan:'D-SNP', id:'D-5519', trigger:'CM Interaction', triggerDetail:'Outreach call — Mar 9',          needs:'Home-delivered meals · Personal care aide', status:'In Progress',  cm:'S. Chen',    riskTier:'MOD',  isNew:false },
  { initials:'JL', name:'James Liu',       age:85, plan:'D-SNP', id:'D-2208', trigger:'Annual Wellness',triggerDetail:'AWV — Mar 5 · Dr. K. Patel',    needs:'Incontinence supplies · Mobility DME',     status:'Fulfilled',    cm:'M. Park',    riskTier:'MOD',  isNew:false },
  { initials:'ER', name:'Eleanor Reyes',   age:74, plan:'D-SNP', id:'D-6601', trigger:'HRA Flag',       triggerDetail:'Health Risk Assessment — Mar 4', needs:'Personal care aide · Transportation',       status:'Pending Auth', cm:'S. Chen',    riskTier:'MOD',  isNew:false },
];
const RISK_COLORS = { HIGH:'#C0392B', MOD:'#F5A623', LOW:'#14907F' };
const CM_TABS = ['All (6)','Action Needed (3)','In Progress (1)','Pending Auth (1)','Fulfilled (1)'];
const CM_MAP  = { 'All (6)':null,'Action Needed (3)':'Action Needed','In Progress (1)':'In Progress','Pending Auth (1)':'Pending Auth','Fulfilled (1)':'Fulfilled' };

function CMWorklist({ onNav }) {
  const [af, setAf] = useState('All (6)');
  const rows = CM_MAP[af] ? cmMembers.filter(m => m.status === CM_MAP[af]) : cmMembers;
  return (
    <div className="flex flex-col gap-4 p-6 flex-1" style={{ background:'#F7F9FB' }}>
      <div className="flex items-start justify-between">
        <div>
          <div className="text-xs font-bold mb-1" style={{ color:'#14907F' }}>PLAN VIEW · CARE MANAGER WORKLIST</div>
          <h1 className="text-2xl font-bold" style={{ color:'#0B1D3A' }}>Member Needs Queue</h1>
          <div className="text-sm mt-1" style={{ color:'#8A9BB0' }}>5 members require action · All trigger types · March 10, 2026</div>
        </div>
        <button className="px-4 py-2 rounded text-sm font-bold text-white" style={{ background:'#14907F', border:'none', cursor:'pointer' }}>+ Log Interaction</button>
      </div>

      <div className="grid grid-cols-4 gap-4">
        <StatCard label="Active Members"      value="6"    sub="with open needs"         valueColor="#C0392B" />
        <StatCard label="Needs Identified"    value="24"   sub="avg 4.0 per member"       valueColor="#1A2332" />
        <StatCard label="Benefits Activated"  value="17"   sub="71% activation rate"      valueColor="#1D7A5F" />
        <StatCard label="Avg Days to Fulfill" value="3.2d" sub="↓ from 14d baseline"      valueColor="#14907F" />
      </div>

      <div className="flex gap-2 items-center flex-wrap">
        <span className="text-xs font-bold" style={{ color:'#8A9BB0' }}>TRIGGER TYPES:</span>
        {Object.entries(TRIGGER_STYLES).map(([k,v]) => (
          <span key={k} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold"
            style={{ background:v.bg, color:v.text }}>{v.icon} {k}</span>
        ))}
      </div>

      <div className="flex gap-0">
        {CM_TABS.map(tab => (
          <button key={tab} onClick={() => setAf(tab)}
            className="px-4 py-1.5 text-sm transition-colors"
            style={{ background:af===tab?'#1A2332':'#F0F2F5', color:af===tab?'#FFFFFF':'#4A5568',
              fontWeight:af===tab?'bold':'normal', border:'none', cursor:'pointer',
              borderRadius:'4px 4px 0 0', marginRight:'2px' }}>{tab}
          </button>
        ))}
      </div>

      <div className="bg-white rounded shadow-sm">
        <div className="grid text-xs font-bold px-4 py-2"
          style={{ background:'#F0F2F5', color:'#8A9BB0',
            gridTemplateColumns:'2fr 1.7fr 2.3fr 1.2fr 70px 80px' }}>
          <span>MEMBER</span><span>TRIGGER</span><span>IDENTIFIED NEEDS</span><span>STATUS</span><span>RISK</span><span></span>
        </div>
        {rows.map((m, i) => (
          <div key={m.id} className="grid items-center px-4 py-3 border-t hover:bg-gray-50 transition-colors"
            style={{ borderColor:'#E2E8EF', gridTemplateColumns:'2fr 1.7fr 2.3fr 1.2fr 70px 80px',
              borderLeft: m.isNew ? '3px solid #C0392B' : '3px solid transparent' }}>
            <div className="flex items-center gap-2">
              <Avatar initials={m.initials} />
              <div>
                <div className="text-sm font-bold" style={{ color:'#1A2332' }}>{m.name}</div>
                <div className="text-xs" style={{ color:'#8A9BB0' }}>Age {m.age} · {m.plan} · {m.id}</div>
                <div className="text-xs" style={{ color:'#8A9BB0' }}>CM: {m.cm}</div>
              </div>
            </div>
            <div>
              <TriggerBadge trigger={m.trigger} />
              <div className="text-xs mt-1" style={{ color:'#8A9BB0' }}>{m.triggerDetail}</div>
              {m.isNew && <div className="text-xs font-bold" style={{ color:'#C0392B' }}>New today</div>}
            </div>
            <div className="text-xs" style={{ color:'#4A5568' }}>{m.needs}</div>
            <StatusBadge status={m.status} />
            <span className="text-xs font-bold" style={{ color: RISK_COLORS[m.riskTier] || '#8A9BB0' }}>{m.riskTier}</span>
            <div className="flex justify-end">
              <button onClick={() => onNav('Member Detail')}
                className="px-3 py-1 rounded text-xs font-bold"
                style={{ background:m.status==='Fulfilled'?'#E2E8EF':'#14907F',
                  color:m.status==='Fulfilled'?'#4A5568':'#FFFFFF', border:'none', cursor:'pointer' }}>
                Act →
              </button>
            </div>
          </div>
        ))}
      </div>

      <div className="rounded px-4 py-2 text-xs" style={{ background:'#D4EDE9', color:'#0D7A6A', borderLeft:'4px solid #14907F' }}>
        Anchor surfaces benefit actions regardless of trigger source — discharge, ED visits, care manager outreach, HRA, or AWV. Every interaction is a governed moment.
      </div>
      <footer className="text-center text-xs mt-2" style={{ color:'#8A9BB0' }}>ANCHOR · MVP Platform Mockup · anchorcare.ai · CONFIDENTIAL</footer>
    </div>
  );
}

/* ── SCREEN 2: MEMBER DETAIL ── */
const memberBenefits = [
  { name:'Incontinence Supplies',      status:'Ready to Fulfill', payer:'Medicare Part B',   payerColor:'#1D4ED8', cap:'$0 / $1,200',        need:'Incontinence',   action:'Generate Order',  border:'#14907F' },
  { name:'Fall Prevention (Grab Bars)',status:'Ready to Fulfill', payer:'Plan Supplemental', payerColor:'#14907F', cap:'$0 / $500',           need:'Fall risk',      action:'Route to Vendor', border:'#14907F' },
  { name:'Home-Delivered Meals',        status:'Pending Auth',    payer:'Medicaid LTSS',     payerColor:'#6D28D9', cap:'State auth required', need:'Food insecurity', action:'Initiate Auth',  border:'#F5A623' },
];

function MemberDetail() {
  return (
    <div className="flex flex-col gap-4 p-6 flex-1" style={{ background:'#F7F9FB' }}>
      <div className="text-xs font-bold" style={{ color:'#14907F' }}>PLAN VIEW · MEMBER BENEFIT ACTION DETAIL</div>
      <div className="bg-white rounded shadow-sm p-4">
        <div className="flex items-start gap-4">
          <Avatar initials="MC" size="lg" />
          <div className="flex-1">
            <div className="flex items-center gap-3 mb-1 flex-wrap">
              <h2 className="text-xl font-semibold" style={{ color:'#1A2332' }}>Margaret Chen</h2>
              <StatusBadge status="Action Needed" />
              <span className="text-xs font-bold" style={{ color:'#C0392B' }}>Risk: HIGH</span>
            </div>
            <div className="text-sm mb-2" style={{ color:'#8A9BB0' }}>Age 78 · MRN: D-4821 · D-SNP · Aid Code: 14H · CM: Sarah Chen, RN</div>
            <div className="flex items-center gap-2 mb-2 flex-wrap">
              <TriggerBadge trigger="Post-Discharge" />
              <span className="text-xs" style={{ color:'#8A9BB0' }}>Discharged St. Joseph's Medical — Mar 8, 2026 · DRG: CHF Exacerbation</span>
            </div>
            <div className="flex gap-2 flex-wrap">
              {['Fall risk','Incontinence','Food insecurity'].map(f => (
                <span key={f} className="px-2 py-0.5 rounded text-xs" style={{ background:'#D4EDE9', color:'#0D7A6A' }}>{f}</span>
              ))}
            </div>
          </div>
          <button className="px-4 py-2 rounded text-sm font-bold text-white flex-shrink-0"
            style={{ background:'#14907F', border:'none', cursor:'pointer' }}>Fulfill All Ready</button>
        </div>
      </div>

      <div>
        <div className="text-sm font-bold" style={{ color:'#1A2332' }}>IDENTIFIED NEEDS → BENEFIT ACTIONS</div>
        <div className="text-xs mt-0.5" style={{ color:'#8A9BB0' }}>
          Trigger: Post-Discharge · Anchor mapped needs to eligibility across Medicare, Medicaid LTSS, and Plan Supplemental
        </div>
      </div>

      {memberBenefits.map(b => (
        <div key={b.name} className="bg-white rounded shadow-sm flex">
          <div className="w-1.5 flex-shrink-0" style={{ background: b.border }} />
          <div className="flex-1 p-4">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-3">
                <span className="text-base font-bold" style={{ color:'#1A2332' }}>{b.name}</span>
                <StatusBadge status={b.status} />
              </div>
              <div className="flex items-center gap-2">
                <button className="px-3 py-1 rounded text-xs" style={{ color:'#14907F', border:'1px solid #E2E8EF', cursor:'pointer' }}>Why? ▼</button>
                <button className="px-3 py-1 rounded text-xs font-bold"
                  style={{ background:b.status==='Pending Auth'?'#FFFFFF':'#14907F',
                    color:b.status==='Pending Auth'?'#14907F':'#FFFFFF',
                    border:b.status==='Pending Auth'?'1px solid #14907F':'none', cursor:'pointer' }}>{b.action}</button>
              </div>
            </div>
            <div className="flex items-center gap-4 text-sm flex-wrap">
              <span style={{ color:'#4A5568' }}>Payer: <strong style={{ color: b.payerColor }}>{b.payer}</strong></span>
              <span style={{ color:'#1A2332' }}>Cap: {b.cap}</span>
              <span style={{ color:'#8A9BB0' }}>Need: {b.need}</span>
            </div>
          </div>
        </div>
      ))}

      <div className="rounded p-4" style={{ background:'#F0F2F5' }}>
        <div className="flex items-center justify-between mb-2">
          <span className="text-sm font-bold" style={{ color:'#1A2332' }}>Auto-Generated Documentation</span>
          <button className="px-3 py-1 bg-white rounded text-xs" style={{ color:'#4A5568', border:'1px solid #E2E8EF', cursor:'pointer' }}>Copy All</button>
        </div>
        <p className="text-xs leading-relaxed" style={{ color:'#4A5568' }}>
          Member Margaret Chen (MRN D-4821) — Post-discharge benefit activation: Medicare Part B incontinence supply order + Plan Supplemental fall prevention authorization. Triggered by 3/8/26 discharge from St. Joseph's. Documentation auto-generated at point of activation. Care manager: Sarah Chen, RN.
        </p>
      </div>
      <footer className="text-center text-xs mt-2" style={{ color:'#8A9BB0' }}>ANCHOR · MVP Platform Mockup · anchorcare.ai · CONFIDENTIAL</footer>
    </div>
  );
}

/* ── SCREEN 3: NEEDS ASSESSMENT (was "Findings Entry" — trigger-agnostic) ── */
const NEED_DEFS = [
  { id:'fall',      label:'Fall Risk',           desc:'Unsteady gait, recent falls, home hazards' },
  { id:'inco',      label:'Incontinence',         desc:'Urinary/bowel incontinence' },
  { id:'food',      label:'Food Insecurity',      desc:'Inadequate nutrition access' },
  { id:'mobility',  label:'Mobility / Transport', desc:'Limited mobility or transport access' },
  { id:'caregiver', label:'Caregiver Strain',     desc:'Caregiver overwhelmed or absent' },
  { id:'social',    label:'Social Isolation',     desc:'Limited social contact or support' },
  { id:'medication',label:'Medication Mgmt',      desc:'Non-adherence, polypharmacy risk' },
  { id:'home',      label:'Home Safety',          desc:'Hazards: stairs, lighting, access' },
  { id:'mental',    label:'Mental Health',        desc:'Depression, anxiety, cognition' },
];
const SEVERITIES = ['identified','significant','urgent'];
const TRIGGER_OPTIONS = ['Post-Discharge','ED Frequent Visitor','CM Interaction','Annual Wellness (AWV)','HRA Flag','Other'];

function NeedsAssessment() {
  const [selected, setSelected] = useState({ fall:'identified', inco:'identified', food:'identified' });
  const [triggerSource, setTriggerSource] = useState('Post-Discharge');

  const toggleNeed = (id) => setSelected(prev => {
    const next = { ...prev };
    if (next[id] !== undefined) delete next[id]; else next[id] = 'identified';
    return next;
  });
  const setSeverity = (id, sev) => setSelected(prev => ({ ...prev, [id]: sev }));

  return (
    <div className="flex flex-col gap-4 p-6 flex-1" style={{ background:'#F7F9FB' }}>
      <div>
        <div className="text-xs font-bold mb-1" style={{ color:'#14907F' }}>PLAN VIEW · NEEDS ASSESSMENT</div>
        <div className="flex items-end justify-between">
          <div>
            <h1 className="text-2xl font-semibold" style={{ color:'#1A2332' }}>Log Member Needs</h1>
            <div className="text-sm mt-1" style={{ color:'#8A9BB0' }}>Margaret Chen · Age 78 · D-SNP · CM: Sarah Chen, RN · March 10, 2026</div>
          </div>
          <div className="text-right">
            <div className="text-3xl font-bold" style={{ color:'#14907F' }}>{Object.keys(selected).length}</div>
            <div className="text-xs" style={{ color:'#8A9BB0' }}>needs selected</div>
          </div>
        </div>
      </div>

      <div className="bg-white rounded shadow-sm p-4">
        <div className="text-sm font-bold mb-1" style={{ color:'#1A2332' }}>Trigger Source</div>
        <div className="text-xs mb-3" style={{ color:'#8A9BB0' }}>What event initiated this needs assessment?</div>
        <div className="flex gap-2 flex-wrap">
          {TRIGGER_OPTIONS.map(t => {
            const key = t.replace(' Visitor','').replace(' (AWV)','');
            const style = TRIGGER_STYLES[key] || {};
            const isActive = triggerSource === t;
            return (
              <button key={t} onClick={() => setTriggerSource(t)}
                className="px-3 py-1.5 rounded text-xs font-bold transition-colors"
                style={{ background:isActive?(style.bg||'#D4EDE9'):'#F0F2F5',
                  color:isActive?(style.text||'#0D7A6A'):'#4A5568',
                  border:isActive?`1.5px solid ${style.text||'#14907F'}`:'1.5px solid transparent',
                  cursor:'pointer' }}>
                {style.icon && <span className="mr-1">{style.icon}</span>}{t}
              </button>
            );
          })}
        </div>
        {triggerSource && (
          <div className="mt-3 text-xs px-3 py-1.5 rounded" style={{ background:'#E8F5F1', color:'#0D7A6A' }}>
            Selected: <strong>{triggerSource}</strong> — Anchor will map identified needs to eligible benefits across all applicable payers.
          </div>
        )}
      </div>

      <div className="text-sm font-bold" style={{ color:'#1A2332' }}>IDENTIFY MEMBER NEEDS</div>
      <div className="grid grid-cols-3 gap-3">
        {NEED_DEFS.map(f => {
          const isSelected = selected[f.id] !== undefined;
          return (
            <div key={f.id} className="rounded p-3 cursor-pointer transition-colors"
              style={{ background:isSelected?'#D4EDE9':'#FFFFFF', border:`1px solid ${isSelected?'#14907F':'#E2E8EF'}` }}
              onClick={() => toggleNeed(f.id)}>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-6 h-6 rounded flex items-center justify-center text-xs font-bold flex-shrink-0"
                  style={{ background:isSelected?'#14907F':'#E2E8EF', color:isSelected?'#FFFFFF':'#8A9BB0' }}>
                  {isSelected ? '✓' : ''}
                </div>
                <span className="text-sm font-bold" style={{ color:isSelected?'#0D7A6A':'#1A2332' }}>{f.label}</span>
              </div>
              <div className="text-xs mb-2 ml-8" style={{ color:isSelected?'#0D7A6A':'#8A9BB0' }}>{f.desc}</div>
              {isSelected && (
                <div className="flex gap-1 ml-1" onClick={e => e.stopPropagation()}>

            )}

      })}

              <div className="flex items-center gap-2">

                  <div className="h-2 rounded-full" style={{ width:`${m.pct}%`,
                    background: m.pct > 80 ? '#C0392B' : m.pct > 60 ? '#F5A623' : '#14907F' }} />
                </div>
                <span className="text-xs font-bold flex-shrink-0"
                  style={{ color: m.pct > 80 ? '#C0392B' : m.pct > 60 ? '#B45309' : '#0D7A6A' }}>{m.pct}%</span>
              </div>
            </div>
            <TriggerBadge trigger={m.trigger} />
            <span className="text-xs font-bold" style={{ color: RISK_COLORS[m.risk] || '#8A9BB0' }}>{m.risk}</span>
          </div>
        ))}
      </div>

      <div className="rounded px-4 py-2 text-xs" style={{ background:'#D4EDE9', color:'#0D7A6A', borderLeft:'4px solid #14907F' }}>
        ILOS cap protection is a direct output of Anchor's sequencing logic — every dollar routed to Medicaid or CBO first is a dollar of SSBCI budget preserved and ILOS exposure reduced.
      </div>
    </div>
  );
}

}

</script>

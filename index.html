<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const STATUS_STYLES = {
  'Action Needed':    { bg:'#FEF3DC', dot:'#F5A623', text:'#B45309' },
  'In Progress':      { bg:'#EDE9FE', dot:'#6D28D9', text:'#6D28D9' },
  'Fulfilled':        { bg:'#D4EDE9', dot:'#14907F', text:'#0D7A6A' },
  'Pending Auth':     { bg:'#DBEAFE', dot:'#1D4ED8', text:'#1D4ED8' },
  'Ready to Fulfill': { bg:'#E8F5F1', dot:'#1D7A5F', text:'#1D7A5F' },
  'Initiated':        { bg:'#F0F2F5', dot:'#8A9BB0', text:'#4A5568' },
  'Complete':         { bg:'#D4EDE9', dot:'#14907F', text:'#0D7A6A' },
  'On Track':         { bg:'#E8F5F1', dot:'#1D7A5F', text:'#1D7A5F' },
  'Attention':        { bg:'#FEF3DC', dot:'#F5A623', text:'#B45309' },
};

const TRIGGER_STYLES = {
  'Post-Discharge':   { bg:'#FDECEA', text:'#C0392B', icon:'🏥' },
  'ED Frequent':      { bg:'#FEF3DC', text:'#B45309', icon:'⚠️' },
  'CM Interaction':   { bg:'#DBEAFE', text:'#1D4ED8', icon:'📋' },
  'Annual Wellness':  { bg:'#EDE9FE', text:'#6D28D9', icon:'🩺' },
  'HRA Flag':         { bg:'#D4EDE9', text:'#0D7A6A', icon:'📊' },
};

function StatusBadge({ status }) {
  const s = STATUS_STYLES[status] || { bg:'#F0F2F5', dot:'#8A9BB0', text:'#4A5568' };
  return (
    <span className="inline-flex items-center gap-1.5 px-2 py-0.5 rounded text-xs font-bold"
      style={{ background: s.bg, color: s.text }}>
      <span className="w-1.5 h-1.5 rounded-full inline-block flex-shrink-0" style={{ background: s.dot }} />
      {status}
    </span>
  );
}

function TriggerBadge({ trigger }) {
  const t = TRIGGER_STYLES[trigger] || { bg:'#F0F2F5', text:'#4A5568', icon:'•' };
  return (
    <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold"
      style={{ background: t.bg, color: t.text }}>
      <span>{t.icon}</span>{trigger}
    </span>
  );
}

function Avatar({ initials, size = 'sm' }) {
  const sz = size === 'lg' ? 'w-14 h-14 text-lg' : 'w-7 h-7 text-xs';
  return (
    <div className={`${sz} rounded-full flex items-center justify-center font-bold flex-shrink-0`}
      style={{ background:'#D4EDE9', color:'#0D7A6A' }}>{initials}</div>
  );
}

function StatCard({ label, value, sub, valueColor = '#14907F' }) {
  return (
    <div className="bg-white rounded p-4 flex flex-col gap-1 shadow-sm">
      <div className="text-xs font-bold" style={{ color:'#8A9BB0' }}>{label}</div>
      <div className="text-3xl font-bold leading-none" style={{ color: valueColor }}>{value}</div>
      <div className="text-xs" style={{ color:'#8A9BB0' }}>{sub}</div>
    </div>
  );
}

const TABS = ['CM Worklist','Benefit Sequencing','Coverage Stack','ILOS / Cap Tracker','Member Care Plan','Member Portal','Provider: AWV','Member Detail','Needs Assessment','Panel Overview','Plan Dashboard','Activation Log'];

function NavBar({ active, onNav }) {
  return (
    <nav className="flex items-center h-11 px-4 gap-0 flex-shrink-0 overflow-x-auto" style={{ background:'#1A2332' }}>
      <div className="flex items-center gap-1.5 mr-4 flex-shrink-0">
        <span className="text-white font-bold text-sm">ANCHOR</span>
        <span className="w-2 h-2 rounded-full" style={{ background:'#14907F' }} />
      </div>
      {TABS.map(tab => (
        <button key={tab} onClick={() => onNav(tab)}
          className="relative px-3 h-11 text-xs font-bold transition-colors flex-shrink-0"
          style={{ color: active === tab ? '#FFFFFF' : '#AABCCC', background:'transparent', border:'none', cursor:'pointer' }}>
          {tab}
          {active === tab && (
            <span className="absolute bottom-0 left-3 right-3 h-1 rounded-t" style={{ background:'#14907F' }} />
          )}
        </button>
      ))}
      <div className="ml-auto w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold text-white flex-shrink-0"
        style={{ background:'#14907F' }}>SC</div>
    </nav>
  );
}

  { initials:'RW', name:'Robert Williams', age:82, plan:'D-SNP', id:'D-3312', trigger:'ED Frequent',    triggerDetail:'3rd ED visit in 60 days',        needs:'Transportation · Caregiver strain · SDOH', status:'Action Needed', cm:'M. Park',    riskTier:'HIGH', isNew:false },
  { initials:'HP', name:'Harold Patel',    age:80, plan:'D-SNP', id:'D-7734', trigger:'ED Frequent',    triggerDetail:'2nd ED visit in 30 days',        needs:'Food insecurity · Social isolation',        status:'Action Needed', cm:'Unassigned', riskTier:'HIGH', isNew:true  },
  { initials:'DJ', name:'Dorothy Jackson', age:71, plan:'D-SNP', id:'D-5519', trigger:'CM Interaction', triggerDetail:'Outreach call — Mar 9',          needs:'Home-delivered meals · Personal care aide', status:'In Progress',  cm:'S. Chen',    riskTier:'MOD',  isNew:false },
  { initials:'JL', name:'James Liu',       age:85, plan:'D-SNP', id:'D-2208', trigger:'Annual Wellness',triggerDetail:'AWV — Mar 5 · Dr. K. Patel',    needs:'Incontinence supplies · Mobility DME',     status:'Fulfilled',    cm:'M. Park',    riskTier:'MOD',  isNew:false },

  const [af, setAf] = useState('All (6)');

          <div className="text-sm mt-1" style={{ color:'#8A9BB0' }}>5 members require action · All trigger types · March 10, 2026</div>
        </div>
        <button className="px-4 py-2 rounded text-sm font-bold text-white" style={{ background:'#14907F', border:'none', cursor:'pointer' }}>+ Log Interaction</button>

      </div>

      <div className="flex gap-2 items-center flex-wrap">
        <span className="text-xs font-bold" style={{ color:'#8A9BB0' }}>TRIGGER TYPES:</span>
        {Object.entries(TRIGGER_STYLES).map(([k,v]) => (
          <span key={k} className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-bold"
            style={{ background:v.bg, color:v.text }}>{v.icon} {k}</span>
        ))}
      </div>

      <div className="flex gap-0">
        {CM_TABS.map(tab => (
          <button key={tab} onClick={() => setAf(tab)}

            style={{ background:af===tab?'#1A2332':'#F0F2F5', color:af===tab?'#FFFFFF':'#4A5568',
              fontWeight:af===tab?'bold':'normal', border:'none', cursor:'pointer',

        {rows.map((m, i) => (

            style={{ borderColor:'#E2E8EF', gridTemplateColumns:'2fr 1.7fr 2.3fr 1.2fr 70px 80px',
              borderLeft: m.isNew ? '3px solid #C0392B' : '3px solid transparent' }}>
            <div className="flex items-center gap-2">
              <Avatar initials={m.initials} />
              <div>
                <div className="text-sm font-bold" style={{ color:'#1A2332' }}>{m.name}</div>
                <div className="text-xs" style={{ color:'#8A9BB0' }}>Age {m.age} · {m.plan} · {m.id}</div>
                <div className="text-xs" style={{ color:'#8A9BB0' }}>CM: {m.cm}</div>
              </div>
            </div>
            <div>
              <TriggerBadge trigger={m.trigger} />
              <div className="text-xs mt-1" style={{ color:'#8A9BB0' }}>{m.triggerDetail}</div>
              {m.isNew && <div className="text-xs font-bold" style={{ color:'#C0392B' }}>New today</div>}
            </div>
            <div className="text-xs" style={{ color:'#4A5568' }}>{m.needs}</div>
            <StatusBadge status={m.status} />
            <span className="text-xs font-bold" style={{ color: RISK_COLORS[m.riskTier] || '#8A9BB0' }}>{m.riskTier}</span>

      <div className="rounded px-4 py-2 text-xs" style={{ background:'#D4EDE9', color:'#0D7A6A', borderLeft:'4px solid #14907F' }}>
        Anchor surfaces benefit actions regardless of trigger source — discharge, ED visits, care manager outreach, HRA, or AWV. Every interaction is a governed moment.
      </div>
      <footer className="text-center text-xs mt-2" style={{ color:'#8A9BB0' }}>ANCHOR · MVP Platform Mockup · anchorcare.ai · CONFIDENTIAL</footer>
    </div>
  );
}

                    background: m.pct > 80 ? '#C0392B' : m.pct > 60 ? '#F5A623' : '#14907F' }} />
                </div>
                <span className="text-xs font-bold flex-shrink-0"
                  style={{ color: m.pct > 80 ? '#C0392B' : m.pct > 60 ? '#B45309' : '#0D7A6A' }}>{m.pct}%</span>

            </div>

            <span className="text-xs font-bold" style={{ color: RISK_COLORS[m.risk] || '#8A9BB0' }}>{m.risk}</span>
          </div>
        ))}
      </div>

      <div className="rounded px-4 py-2 text-xs" style={{ background:'#D4EDE9', color:'#0D7A6A', borderLeft:'4px solid #14907F' }}>
        ILOS cap protection is a direct output of Anchor's sequencing logic — every dollar routed to Medicaid or CBO first is a dollar of SSBCI budget preserved and ILOS exposure reduced.
      </div>
    </div>
  );
}
